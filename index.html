<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTE Cell Scanner Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; max-width: 800px; margin: 40px auto; padding: 20px; }
        .container { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 14px; }
        input[type="password"], input[type="number"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        #results { margin-top: 25px; }
        .result-card { background: #ecf0f1; padding: 15px; border-radius: 5px; margin-bottom: 10px; border-left: 5px solid #3498db; }
        .success { border-left-color: #2ecc71; background: #e8f8f5; }
        .error { border-left-color: #e74c3c; background: #fadbd8; }
        .tower { border-left-color: #9b59b6; background: #f5eef8; border-width: 8px; }
        .band-badge { background: #34495e; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-left: 10px; text-transform: uppercase; }
        #map-container { height: 400px; width: 100%; margin-top: 20px; border-radius: 10px; border: 2px solid #ddd; display: none; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; vertical-align: middle; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h2>Сканер LTE БС з картою</h2>
    
    <div class="form-group">
        <label for="appPassword">Пароль доступу:</label>
        <input type="password" id="appPassword" placeholder="Ваш пароль">
    </div>

    <div class="form-group">
        <label for="bsNumber">Номер БС (eNodeB):</label>
        <input type="number" id="bsNumber" placeholder="Наприклад: 942001">
    </div>

    <div class="form-group">
        <label for="operator">Оператор:</label>
        <select id="operator">
            <option value="">-- Оберіть оператора --</option>
            <option value="255,1">Vodafone UA</option>
            <option value="255,3">Kyivstar</option>
            <option value="255,6">lifecell</option>
        </select>
    </div>

    <div class="form-group">
        <label for="band">Діапазон:</label>
        <select id="band" disabled></select>
    </div>

    <button id="searchBtn" onclick="startSearch()">Пошук</button>

    <div id="results"></div>
    <div id="map-container"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const bandsData = {
        "255,1": { "B1": [11, 12, 13], "B3": [31, 32, 33], "B7": [71, 72, 73], "B8": [81, 82, 83], "B38": [61, 62, 63] },
        "255,3": { "B1": [51, 52, 53], "B3": [31, 32, 33], "B7": [41, 42, 43], "B8": [21, 22, 23], "B40": [61, 62, 63] },
        "255,6": { "B1": [12, 22, 32], "B3": [11, 21, 31], "B7": [13, 23, 33], "B8": [19, 29, 39] }
    };

    let map = null;
    let markersLayer = null;

    document.getElementById('operator').addEventListener('change', function() {
        const bandSel = document.getElementById('band');
        bandSel.innerHTML = '<option value="">-- Оберіть Band --</option>';
        if (this.value) {
            bandSel.disabled = false;
            const data = bandsData[this.value];
            
            // Опція для всіх бендів
            let all = [];
            for (let b in data) {
                all.push({ name: b, sectors: data[b] });
                let opt = document.createElement('option');
                opt.value = JSON.stringify([{ name: b, sectors: data[b] }]);
                opt.textContent = b;
                bandSel.appendChild(opt);
            }
            let optAll = document.createElement('option');
            optAll.value = JSON.stringify(all);
            optAll.textContent = "Усі бенди (Повний пошук)";
            bandSel.insertBefore(optAll, bandSel.firstChild.nextSibling);
        } else {
            bandSel.disabled = true;
        }
    });

    async function startSearch() {
        const password = document.getElementById('appPassword').value.trim();
        const enodeb = parseInt(document.getElementById('bsNumber').value.trim(), 10);
        const opVal = document.getElementById('operator').value;
        const bandVal = document.getElementById('band').value;

        if (!password || !enodeb || !opVal || !bandVal) return alert("Заповніть поля!");

        const [mcc, mnc] = opVal.split(',').map(Number);
        const bandGroups = JSON.parse(bandVal);
        const resultsDiv = document.getElementById('results');
        const mapBox = document.getElementById('map-container');
        const btn = document.getElementById('searchBtn');

        resultsDiv.innerHTML = "<i>Пошук...</i>";
        mapBox.style.display = 'none';
        btn.disabled = true;
        
        let validCoords = [];
        let html = '';

        for (let group of bandGroups) {
            for (let s of group.sectors) {
                const cellId = (enodeb * 256) + s;
                try {
                    // ТУТ ВСТАВТЕ ВАШ URL RENDER
                    const resp = await fetch('https://cell-backend-pih1.onrender.com/locate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password, cellId, mcc, mnc })
                    });
                    const d = await resp.json();

                    if (resp.ok) {
                        validCoords.push({ lat: d.location.lat, lng: d.location.lng, label: `${group.name}:${s}` });
                        html += `
                            <div class="result-card success">
                                <strong>Сектор: ${s}</strong> <span class="band-badge">${group.name}</span><br>
                                Координати: ${d.location.lat}, ${d.location.lng}<br>
                                <a href="https://www.google.com/maps?q=${d.location.lat},${d.location.lng}" target="_blank">Google Maps</a>
                            </div>`;
                    } else {
                        html += `<div class="result-card error">Сектор ${s} (${group.name}): Не знайдено</div>`;
                    }
                } catch (e) { console.error(e); }
            }
        }

        if (validCoords.length > 0) {
            const avgLat = validCoords.reduce((a, b) => a + b.lat, 0) / validCoords.length;
            const avgLng = validCoords.reduce((a, b) => a + b.lng, 0) / validCoords.length;

            html += `
                <div class="result-card tower">
                    <strong>📡 Центр БС (${validCoords.length} сект.)</strong><br>
                    Координати: ${avgLat.toFixed(6)}, ${avgLng.toFixed(6)}<br>
                    <a href="https://www.google.com/maps?q=${avgLat},${avgLng}" target="_blank">Google Maps</a>
                </div>`;
            
            initMap(validCoords, avgLat, avgLng);
        }

        resultsDiv.innerHTML = html;
        btn.disabled = false;
    }

    function initMap(points, cLat, cLng) {
        document.getElementById('map-container').style.display = 'block';
        if (map) map.remove();
        
        map = L.map('map-container').setView([cLat, cLng], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        points.forEach(p => {
            L.circleMarker([p.lat, p.lng], { color: '#3498db', radius: 6 }).addTo(map)
             .bindPopup(`Сектор ${p.label}`);
        });

        // Маркер вишки
        L.marker([cLat, cLng]).addTo(map)
         .bindPopup('<b>Фізична позиція БС</b>').openPopup();
    }
</script>
</body>
</html>
