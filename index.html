<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сканер Координат БС (Через Backend)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 14px;
        }
        input[type="text"], input[type="password"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .hint {
            display: block;
            color: #7f8c8d;
            font-size: 12px;
            margin-top: 4px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #2980b9;
        }
        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
        #results {
            margin-top: 25px;
        }
        .result-card {
            background: #ecf0f1;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            border-left: 5px solid #3498db;
        }
        .error {
            border-left-color: #e74c3c;
            background: #fadbd8;
        }
        a.map-link {
            color: #2980b9;
            text-decoration: none;
            font-weight: bold;
        }
        a.map-link:hover {
            text-decoration: underline;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            vertical-align: middle;
            margin-right: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Сканер секторів БС</h2>
    
    <div class="form-group">
        <label for="appPassword">Пароль доступу:</label>
        <input type="password" id="appPassword" placeholder="Введіть ваш таємний пароль">
    </div>

    <div class="form-group">
        <label for="bsNumber">Номер БС (LAC та eNodeB):</label>
        <input type="text" id="bsNumber" placeholder="Наприклад: 65432-12345">
        <span class="hint">Введіть LAC та номер бази через дефіс, пробіл або кому</span>
    </div>

    <div class="form-group">
        <label for="operator">Оператор:</label>
        <select id="operator">
            <option value="">-- Оберіть оператора --</option>
            <option value="255,1">Vodafone UA (MCC 255 MNC 01)</option>
            <option value="255,3">Kyivstar (MCC 255 MNC 03)</option>
            <option value="255,6">lifecell (MCC 255 MNC 06)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="band">Band (Сектори):</label>
        <select id="band" disabled>
            <option value="">-- Спочатку оберіть оператора --</option>
        </select>
    </div>

    <button id="searchBtn" onclick="startSearch()">Пошук</button>

    <div id="results"></div>
</div>

<script>
    const bandsData = {
        "255,1": {
            "B1 (11, 12, 13)": [11, 12, 13],
            "B3 (31, 32, 33)": [31, 32, 33],
            "B7 (71, 72, 73)": [71, 72, 73],
            "B8 (81, 82, 83)": [81, 82, 83],
            "B38 (61, 62, 63)": [61, 62, 63]
        },
        "255,3": {
            "B1 (51, 52, 53)": [51, 52, 53],
            "B3 (31, 32, 33)": [31, 32, 33],
            "B7 (41, 42, 43)": [41, 42, 43],
            "B8 (21, 22, 23)": [21, 22, 23],
            "B40 (61, 62, 63)": [61, 62, 63]
        },
        "255,6": {
            "B1 (12, 22, 32)": [12, 22, 32],
            "B3 (11, 21, 31)": [11, 21, 31],
            "B7 (13, 23, 33)": [13, 23, 33],
            "B8 (19, 29, 39)": [19, 29, 39]
        }
    };

    const operatorSelect = document.getElementById('operator');
    const bandSelect = document.getElementById('band');
    const resultsDiv = document.getElementById('results');
    const searchBtn = document.getElementById('searchBtn');

    operatorSelect.addEventListener('change', function() {
        bandSelect.innerHTML = '<option value="">-- Оберіть Band --</option>';
        if (this.value) {
            bandSelect.disabled = false;
            const bands = bandsData[this.value];
            for (const [bandName, sectors] of Object.entries(bands)) {
                const option = document.createElement('option');
                option.value = JSON.stringify(sectors);
                option.textContent = bandName;
                bandSelect.appendChild(option);
            }
        } else {
            bandSelect.disabled = true;
        }
    });

    async function startSearch() {
        const password = document.getElementById('appPassword').value.trim();
        const bsNumberRaw = document.getElementById('bsNumber').value.trim();
        const operatorValue = document.getElementById('operator').value;
        const bandValue = document.getElementById('band').value;

        if (!password || !bsNumberRaw || !operatorValue || !bandValue) {
            alert("Будь ласка, заповніть всі поля!");
            return;
        }

        const bsParts = bsNumberRaw.split(/[^\d]+/);
        
        if (bsParts.length < 2 || !bsParts[0] || !bsParts[1]) {
            alert("Помилка формату! Введіть LAC та номер БС разом. Наприклад: 65432-12345");
            return;
        }

        const tac = parseInt(bsParts[0], 10);
        const enodeb = parseInt(bsParts[1], 10);
        
        const [mcc, mnc] = operatorValue.split(',').map(Number);
        const sectors = JSON.parse(bandValue);
        
        // Використовуємо подвійні лапки для уникнення конфлікту з апострофом
        resultsDiv.innerHTML = "<i>З'єднуємось із сервером... (Якщо сервер спав, перший запит може тривати до 50 секунд)</i>";
        
        const originalBtnText = searchBtn.innerHTML;
        searchBtn.innerHTML = '<span class="spinner"></span> Шукаю...';
        searchBtn.disabled = true;

        let resultsHTML = '';

        for (const sector of sectors) {
            const fullCellId = (enodeb * 256) + sector;

            const payload = {
                "password": password,
                "cellId": fullCellId,
                "tac": tac,
                "mcc": mcc,
                "mnc": mnc
            };

            try {
                // !!! УВАГА !!!
                // Замініть цей URL на адресу вашого додатку, яку вам видав Render
                const renderUrl = 'https://cell-backend-pih1.onrender.com/locate'; 
                
                const response = await fetch(renderUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    const lat = data.location.lat;
                    const lng = data.location.lng;
                    const accuracy = data.accuracy;
                    
                    resultsHTML += `
                        <div class="result-card">
                            <strong>Сектор: ${sector}</strong> (Full Cell ID: ${fullCellId})<br>
                            Координати: ${lat}, ${lng}<br>
                            Точність: ~${accuracy} метрів<br>
                            <a class="map-link" href="https://www.google.com/maps/search/?api=1&query=${lat},${lng}" target="_blank">Подивитись на Google Maps</a>
                        </div>`;
                } else {
                    const errorMsg = data.error?.message || "Невідома помилка";
                    resultsHTML += `
                        <div class="result-card error">
                            <strong>Сектор: ${sector}</strong> (Full Cell ID: ${fullCellId})<br>
                            Помилка: ${errorMsg}
                        </div>`;
                }
            } catch (error) {
                resultsHTML += `
                    <div class="result-card error">
                        <strong>Сектор: ${sector}</strong><br>
                        Помилка з'єднання з сервером (Render): ${error.message}
                    </div>`;
            }
        }

        resultsDiv.innerHTML = resultsHTML;
        
        searchBtn.innerHTML = originalBtnText;
        searchBtn.disabled = false;
    }
</script>

</body>
</html>
